name: CI and CD FastAPI
on:
  push:
    branches:
    - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    # checkout the code
    name: Checkout code
    uses: actions/checkout@v2

    # login to docker hub
    name: Login to Docker Hub
    uses: docker/login-action@v3
    with:
      username: ${{ secrets.DOCKER_USERNAME }}
      password: ${{ secrets.DOCKER_PASSWORD }}

    # Build the image
    name: Build Image
    uses: docker/build-push-action@v3
    with:
       context: .
       push: true
       tags: ${{ secrets.DOCKER_USERNAME }}/fastapi:latest

    # Push the image to Docker Hub
    name: Push Image
    run: docker push ${{ secrets.DOCKER_USERNAME }}/fastapi:latest

    # Deploy to server using SSH
    name: Deploy to Server
    uses: appleboy/ssh-action@v0.1.5
    with:
      host: ${{ secrets.SERVER_HOST }}
      username: ${{ secrets.SERVER_USER }}
      key: ${{ secrets.SERVER_SSH_KEY }}
      script: |
        docker pull ${{ secrets.DOCKER_USERNAME }}/fastapi:latest
        docker stop fastapi || true
        docker rm fastapi || true
        docker run -d --name fastapi -p 80:80 ${{ secrets.DOCKER_USERNAME }}/fastapi:latest 
        